name: BE3600-Experimental-Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y build-essential clang flex bison g++ gawk gcc-multilib g++-multilib gettext git libncurses5-dev libssl-dev python3-distutils rsync unzip zlib1g-dev file wget

      - name: Clone source
        run: |
          # Пробуем форк, где поддержка BE3600 более вероятна
          git clone --depth 1 https://github.com/VIK_AD/immortalwrt.git source || git clone --depth 1 https://github.com/immortalwrt/immortalwrt.git source
          cd source
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: RECON (Разведка)
        run: |
          cd source
          echo "Ищем упоминания Xiaomi BE3600..."
          # Ищем по всем папкам без привязки к таргету
          grep -Ril "be3600" target/linux/ | head -n 5 || echo "Опять не нашли"

      - name: Generate Config
        run: |
          cd source
          # Пытаемся завести конфиг через автоподбор
          printf 'CONFIG_TARGET_qualcommax=y\nCONFIG_TARGET_qualcommax_ipq50xx=y\nCONFIG_TARGET_qualcommax_ipq50xx_DEVICE_xiaomi_be3600=y' > .config
          make defconfig

      - name: Build
        run: |
          cd source
          make -j$(nproc) || make -j1 V=s

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: Firmware-BE3600-Try2
          path: source/bin/targets/*/*/*
          
