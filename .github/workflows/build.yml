name: BE3600-Ultra-Scanner

on:
  workflow_dispatch:

jobs:
  find_source:
    runs-on: ubuntu-22.04
    steps:
      - name: Search Code Globally
        run: |
          echo "=== ИЩЕМ ВСЕ РЕПОЗИТОРИИ С ПОДДЕРЖКОЙ BE3600 ==="
          # Ищем файлы, где упоминается модель, и выводим названия репозиториев
          gh search code "xiaomi_be3600" --limit 10 --json repository,path --jq '.[] | "\(.repository.full_name) -> \(.path)"'
          
          echo -e "\n=== ИЩЕМ УПОМИНАНИЯ RD15 ==="
          gh search code "rd15" --limit 10 --json repository,path --jq '.[] | "\(.repository.full_name) -> \(.path)"'
        env:
          GH_TOKEN: ${{ github.token }}
          
