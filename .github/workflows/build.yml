name: BE3600-Final-Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y build-essential clang flex bison g++ gawk gcc-multilib g++-multilib gettext git libncurses5-dev libssl-dev python3-distutils rsync unzip zlib1g-dev file wget

      - name: Clone source
        run: |
          git clone --depth 1 https://github.com/immortalwrt/immortalwrt.git source
          cd source
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: RECON (Разведка)
        run: |
          cd source
          echo "=== Ищем Xiaomi BE3600 ==="
          grep -R "be3600" target/linux/qualcommax/ || echo "Не найдено"

      - name: Generate Config
        run: |
          cd source
          echo "CONFIG_TARGET_qualcommax=y" > .config
          echo "CONFIG_TARGET_qualcommax_ipq50xx=y" >> .config
          echo "CONFIG_TARGET_qualcommax_ipq50xx_DEVICE_xiaomi_be3600=y" >> .config
          make defconfig

      - name: Build firmware
        run: |
          cd source
          make -j$(nproc) || make -j1 V=s

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Firmware-BE3600
          path: source/bin/targets/*/*/*
          
