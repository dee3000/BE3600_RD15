name: BE3600-Deep-Audit

on:
  workflow_dispatch:

jobs:
  audit:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Clone source
        run: |
          # Клонируем форк, где поддержка BE3600 наиболее вероятна
          git clone --depth 1 https://github.com/VIK_AD/immortalwrt.git source

      - name: Deep Search & Report
        run: |
          cd source
          {
            echo "=== ГЛУБОКИЙ ПОИСК: BE3600 / RD15 / XIAOMI ==="
            grep -RinE "be3600|rd15|xiaomi" target/linux/qualcommax/ 2>/dev/null || echo "В основном таргете совпадений нет"
            
            echo -e "\n=== СТРУКТУРА ТАРГЕТА IPQ50XX ==="
            ls -R target/linux/qualcommax/image/ | grep "ipq50xx" || echo "Файлы не найдены"
            
            echo -e "\n=== ПОИСК В PROFILES.JSON ==="
            find . -name profiles.json -exec grep -lE "be3600|rd15|xiaomi" {} + || echo "В индексах упоминаний нет"
            
            echo -e "\n=== ВСЕ ДОСТУПНЫЕ XIAOMI В ЭТОМ ТАРГЕТЕ ==="
            grep -r "DEVICE_TITLE.*Xiaomi" target/linux/qualcommax/image/ || echo "Xiaomi не найдены"
          } | tee ../audit-report.txt

      - name: Upload Report
        uses: actions/upload-artifact@v4
        with:
          name: BE3600-Audit-Report
          path: audit-report.txt
          
