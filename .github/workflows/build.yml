name: BE3600-PR-Search

on:
  workflow_dispatch:

jobs:
  search_pr:
    runs-on: ubuntu-22.04
    steps:
      - name: Search Pull Requests
        run: |
          echo "=== ИЩЕМ ОТКРЫТЫЕ ПРАВКИ ПО BE3600 В IMMORTALWRT ==="
          # Используем GitHub CLI, чтобы найти PR по ключевым словам
          gh pr list -R immortalwrt/immortalwrt -S "BE3600" --state all
          gh pr list -R immortalwrt/immortalwrt -S "RD15" --state all
        env:
          GH_TOKEN: ${{ github.token }}
          
