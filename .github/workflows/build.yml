name: BE3600-Deep-Audit

on:
  workflow_dispatch:

jobs:
  audit:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Clone source
        run: |
          # Используем основной репозиторий, он гарантированно доступен
          git clone --depth 1 https://github.com/immortalwrt/immortalwrt.git source

      - name: Deep Search & Report
        run: |
          cd source
          {
            echo "=== ГЛУБОКИЙ ПОИСК: BE3600 / RD15 / XIAOMI ==="
            # Ищем по всему дереву, вдруг оно в другом таргете
            grep -RinE "be3600|rd15|xiaomi" target/linux/ 2>/dev/null || echo "Совпадений в таргетах не найдено"
            
            echo -e "\n=== ПОИСК В ТАБЛИЦЕ ПРОФИЛЕЙ ==="
            find target/linux/ -name profiles.json -exec grep -lE "be3600|rd15|xiaomi" {} + || echo "В profiles.json пусто"
            
            echo -e "\n=== ДОСТУПНЫЕ XIAOMI В QUALCOMMAX ==="
            grep -r "DEVICE_TITLE.*Xiaomi" target/linux/qualcommax/image/ 2>/dev/null || echo "Xiaomi не найдены"
          } | tee ../audit-report.txt

      - name: Upload Report
        uses: actions/upload-artifact@v4
        with:
          name: BE3600-Audit-Report
          path: audit-report.txt
