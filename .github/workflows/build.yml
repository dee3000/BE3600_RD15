name: DTS Inventory

on:
  workflow_dispatch:

jobs:
  inventory:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout ImmortalWrt
        uses: actions/checkout@v4
        with:
          repository: immortalwrt/immortalwrt
          ref: master
          path: immortalwrt

      - name: List qualcommax DTS files
        run: |
          echo "=== FILES IN target/linux/qualcommax/dts ==="
          find immortalwrt/target/linux/qualcommax/dts -maxdepth 1 -type f | sort

      - name: Show IPQ5332-related files
        run: |
          echo "=== IPQ5332 / XIAOMI / MI04 / BE3600 MATCHES ==="
          grep -RInE "ipq5332|xiaomi|mi04|be3600|rd15" immortalwrt/target/linux/qualcommax/dts || true
