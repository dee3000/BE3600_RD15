name: Repo Search

on:
  workflow_dispatch:

jobs:
  inventory:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout ImmortalWrt
        uses: actions/checkout@v4
        with:
          repository: immortalwrt/immortalwrt
          ref: master
          path: immortalwrt

      - name: Search whole repo
        run: |
          echo "=== MATCHES FOR be3600 mi04 rd15 ipq5332 xiaomi ax3600 ax6000 ax9000 ==="
          grep -RInE "be3600|mi04|rd15|ipq5332|xiaomi|ax3600|ax6000|ax9000" immortalwrt || true
